<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeHako</title>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('animehako-theme');
          
          if (stored === 'light') {
            document.documentElement.classList.remove('dark');
            document.body.style.setProperty('--fouc-bg', 'oklch(1 0 0)');
            document.body.style.setProperty('--fouc-fg', 'oklch(0.145 0 0)');
          } else if (stored === 'dark') {
            document.body.style.setProperty('--fouc-bg', 'oklch(0.145 0 0)');
            document.body.style.setProperty('--fouc-fg', 'oklch(0.985 0 0)');
          } else if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.remove('dark');
            document.body.style.setProperty('--fouc-bg', 'oklch(1 0 0)');
            document.body.style.setProperty('--fouc-fg', 'oklch(0.145 0 0)');
          } else {
            document.body.style.setProperty('--fouc-bg', 'oklch(0.145 0 0)');
            document.body.style.setProperty('--fouc-fg', 'oklch(0.985 0 0)');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
